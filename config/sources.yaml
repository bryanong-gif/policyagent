    jurisdiction: uk
    domain: [tech_governance, online_safety]

  - id: uk_dsit_news
    name: "DSIT Press Releases"
    url: "https://www.gov.uk/search/news-and-communications.atom?organisations%5B%5D=department-for-science-innovation-and-technology"
    type: rss
    jurisdiction: uk
    domain: [ai_safety, tech_governance, online_safety]

  - id: uk_aisi_news
    name: "AI Safety Institute"
    url: "https://www.gov.uk/government/organisations/ai-safety-institute.atom"
