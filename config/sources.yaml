# config/sources.yaml
# All RSS feeds and scrape targets for the policy trend agent.
# type: rss   → fetched via feedparser
# type: scrape → fetched via BeautifulSoup (requires a selector config)

sources:

  # ─────────────────────────────────────────────
  # SINGAPORE
  # ─────────────────────────────────────────────
  - id: sg_imda_news
    name: "IMDA News"
    url: "https://www.imda.gov.sg/resources/press-releases-factsheets-and-speeches/press-releases"
    type: scrape
    jurisdiction: sg
    domain: [online_safety, ai_safety, tech_governance]
    selector: "article.news-listing"
    link_selector: "a.news-title"
    date_selector: "span.date"

  - id: sg_pdpc_news
    name: "PDPC News & Media"
    url: "https://www.pdpc.gov.sg/news-and-events/news"
    type: scrape
    jurisdiction: sg
    domain: [tech_governance]
    selector: "div.news-item"
    link_selector: "a"
    date_selector: "span.date"

  - id: sg_mas_media
    name: "MAS Media Releases"
    url: "https://www.mas.gov.sg/news"
    type: scrape
    jurisdiction: sg
    domain: [tech_governance, ai_safety]
    selector: "div.news-item"
    link_selector: "h3 a"
    date_selector: "span.date"

  - id: sg_smart_nation
    name: "Smart Nation Press Releases"
    url: "https://www.smartnation.gov.sg/media-hub/press-releases"
    type: scrape
    jurisdiction: sg
    domain: [ai_safety, tech_governance]
    selector: "div.press-release-item"
    link_selector: "a"
    date_selector: "span.date"

  - id: sg_govtech_blog
    name: "GovTech Blog"
    url: "https://www.tech.gov.sg/media/technews/"
    type: scrape
    jurisdiction: sg
    domain: [ai_safety, tech_governance]
    selector: "article"
    link_selector: "a.article-title"
    date_selector: "time"

  # ─────────────────────────────────────────────
  # AUSTRALIA
  # ─────────────────────────────────────────────
  - id: au_acma_news
    name: "ACMA News"
    url: "https://www.acma.gov.au/newsroom"
    type: scrape
    jurisdiction: au
    domain: [online_safety, tech_governance]
    selector: "div.view-content article"
    link_selector: "a"
    date_selector: "span.date-display-single"

  - id: au_oaic_news
    name: "OAIC News"
    url: "https://www.oaic.gov.au/updates/news-and-media"
    type: scrape
    jurisdiction: au
    domain: [tech_governance, online_safety]
    selector: "article.news-item"
    link_selector: "h3 a"
    date_selector: "time"

  - id: au_ag_news
    name: "Attorney-General's Dept"
    url: "https://www.ag.gov.au/about-us/news-and-media/media-releases"
    type: scrape
    jurisdiction: au
    domain: [tech_governance, online_safety]
    selector: "div.news-listing article"
    link_selector: "a.news-title"
    date_selector: "span.date"

  - id: au_dsr_blog
    name: "Dept of Industry – AI"
    url: "https://www.industry.gov.au/news/media-releases"
    type: scrape
    jurisdiction: au
    domain: [ai_safety, tech_governance]
    selector: "article"
    link_selector: "a"
    date_selector: "time"

  - id: au_esafety_news
    name: "eSafety Commissioner News"
    url: "https://www.esafety.gov.au/newsroom"
    type: scrape
    jurisdiction: au
    domain: [online_safety]
    selector: "article"
    link_selector: "h3 a"
    date_selector: "time"

  # ─────────────────────────────────────────────
  # UNITED KINGDOM
  # ─────────────────────────────────────────────
  - id: uk_ofcom_news
    name: "Ofcom News"
    url: "https://www.ofcom.org.uk/news-centre/latest/rss"
    type: rss
    jurisdiction: uk
    domain: [online_safety, tech_governance]

  - id: uk_ico_news
    name: "ICO News"
    url: "https://ico.org.uk/about-the-ico/media-centre/news-and-blogs/rss/"
