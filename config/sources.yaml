  - id: eu_ai_office
    name: "EU AI Office"
    url: "https://digital-strategy.ec.europa.eu/en/policies/ai-office"
    type: scrape
    jurisdiction: eu
    domain: [ai_safety]
    selector: "article"
    link_selector: "a"
    date_selector: "time"

  - id: eu_parliament_news
    name: "EP Digital Committee"
    url: "https://www.europarl.europa.eu/rss/en/press-releases-all.xml"
    type: rss
    jurisdiction: eu
    domain: [ai_safety, tech_governance, online_safety]
    keywords_filter: ["AI", "digital", "online safety", "data", "cyber"]

  # ─────────────────────────────────────────────
  # ASEAN
  # ─────────────────────────────────────────────
  - id: asean_secretariat_news
    name: "ASEAN Secretariat News"
    url: "https://asean.org/category/news/feed/"
    type: rss
    jurisdiction: asean
    domain: [ai_safety, tech_governance, online_safety]
