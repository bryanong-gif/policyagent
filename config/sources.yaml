  # ─────────────────────────────────────────────
  # EUROPEAN UNION
  # ─────────────────────────────────────────────
  - id: eu_commission_digital
    name: "EC Digital News"
    url: "https://digital-strategy.ec.europa.eu/en/news/rss.xml"
    type: rss
    jurisdiction: eu
    domain: [online_safety, ai_safety, tech_governance]

  - id: eu_edpb_news
    name: "EDPB News"
    url: "https://www.edpb.europa.eu/news/news_en.rss"
